<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My To Do List</title>
  <link rel="stylesheet" href="/src/css/style.css">
</head>

<body>

  <div class="app">

    <!-- Title -->
    <h1>MY TO DO LIST</h1>

    <!-- Input -->
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="What should we do?" />
      <button class="btn-save" id="btn-add">Save</button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box done">Todo Done : <span id="count-done">0</span></div>
      <div class="stat-box progress">Todo On Progress : <span id="count-progress">0</span></div>
    </div>

    <!-- List -->
    <div id="todo-list"></div>

  </div>

  <script type="module" src="/src/js/index.js"></script>
</body>

</html>
